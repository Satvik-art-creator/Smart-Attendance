<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Attendance Tracker</title>
  <meta name="description" content="Login to the Smart Attendance Tracker. Students, Teachers, and Admins can access their dashboards.">
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card card">
      <div class="login-header">
        <p class="eyebrow-tag">Smart Attendance</p>
        <h1>Welcome Back</h1>
        <p class="login-sub">Sign in to your dashboard</p>
      </div>

      <!-- Role Tabs -->
      <div class="role-tabs" id="roleTabs">
        <button class="role-tab active" data-role="student">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Student
        </button>
        <button class="role-tab" data-role="teacher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Teacher
        </button>
        <button class="role-tab" data-role="admin">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4"/></svg>
          Admin
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        <input type="hidden" id="roleInput" value="student">

        <div class="form-group">
          <label class="form-label" id="idLabel" for="identifier">Roll Number</label>
          <input class="form-input" type="text" id="identifier" placeholder="Enter your roll number" required autofocus>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="pass-eye" id="passToggle" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="login-error"></div>

        <button type="submit" class="btn btn-primary btn-block login-btn" id="loginBtn">
          <span>Sign In</span>
          <svg class="login-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="login-footer">
        <p>🔒 Secured with encrypted sessions</p>
      </div>
    </div>

    <!-- Decorative background -->
    <div class="login-bg-decor">
      <div class="decor-circle decor-1"></div>
      <div class="decor-circle decor-2"></div>
      <div class="decor-circle decor-3"></div>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
